<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chess Opening Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0a0f;
      --surf:     #111118;
      --surf2:    #18181f;
      --border:   #252530;
      --gold:     #d4af37;
      --gold-dim: #7a6318;
      --cream:    #f0ead6;
      --muted:    #55526a;
      --red:      #f87171;
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      background: var(--bg);
      color: var(--cream);
      font-family: 'Inter', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
    }

    /* ── Nav ── */
    nav {
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.5rem;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .logo {
      font-family: 'Cinzel', serif;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      color: var(--gold);
    }
    .logo span { color: var(--cream); opacity: 0.55; font-weight: 400; }

    .status {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      font-size: 0.72rem;
      color: var(--muted);
    }
    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
    }
    .dot.ok  { background: #4ade80; }
    .dot.err { background: var(--red); }

    /* ── Layout ── */
    main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ── Left Panel ── */
    .left {
      width: 380px;
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      padding: 1.25rem;
      gap: 1.1rem;
    }
    .left::-webkit-scrollbar { width: 3px; }
    .left::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .lbl {
      font-size: 0.67rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.55rem;
    }

    /* chips */
    .chips { display: flex; flex-wrap: wrap; gap: 0.4rem; }
    .chip {
      padding: 0.3rem 0.65rem;
      border: 1px solid var(--border);
      border-radius: 100px;
      font-size: 0.75rem;
      color: var(--muted);
      cursor: pointer;
      background: transparent;
      font-family: inherit;
      transition: all 0.15s;
    }
    .chip:hover {
      border-color: var(--gold-dim);
      color: var(--cream);
      background: rgba(212,175,55,0.07);
    }

    /* input */
    .input-wrap { position: relative; }
    textarea {
      width: 100%;
      min-height: 76px;
      padding: 0.8rem 3rem 0.8rem 0.9rem;
      background: var(--surf2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--cream);
      font-family: inherit;
      font-size: 0.9rem;
      line-height: 1.5;
      resize: none;
      outline: none;
      transition: border-color 0.15s;
    }
    textarea:focus { border-color: var(--gold-dim); }
    textarea::placeholder { color: var(--muted); }

    .send {
      position: absolute;
      right: 0.55rem;
      bottom: 0.55rem;
      width: 34px; height: 34px;
      border-radius: 6px;
      background: var(--gold);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, opacity 0.15s;
    }
    .send:hover { background: #e8c94a; }
    .send:disabled { opacity: 0.35; cursor: not-allowed; }
    .send svg { width: 15px; height: 15px; fill: #0a0a0f; }

    /* thinking */
    .thinking {
      display: none;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.8rem;
      color: var(--muted);
    }
    .thinking.on { display: flex; }
    .dots { display: flex; gap: 3px; }
    .dots span {
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--gold);
      animation: blink 1.2s ease-in-out infinite;
    }
    .dots span:nth-child(2) { animation-delay: .2s; }
    .dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes blink {
      0%,80%,100% { opacity:.2; transform:scale(.8); }
      40%          { opacity:1;  transform:scale(1);  }
    }

    /* answer */
    .answer-card {
      background: var(--surf);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.9rem;
      display: none;
    }
    .answer-card.on { display: block; }
    .answer-text { font-size: 0.88rem; line-height: 1.7; }
    .err { color: var(--red); }

    /* source cards */
    .source-card {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      padding: 0.65rem 0.8rem;
      background: var(--surf2);
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .source-card:hover  { border-color: var(--gold-dim); background: rgba(212,175,55,.04); }
    .source-card.active { border-color: var(--gold);     background: rgba(212,175,55,.09); }

    .eco {
      font-family: 'Cinzel', serif;
      font-size: 0.68rem;
      font-weight: 600;
      color: var(--gold);
      background: rgba(212,175,55,.12);
      border: 1px solid rgba(212,175,55,.22);
      border-radius: 4px;
      padding: 0.18rem 0.4rem;
      letter-spacing: .04em;
      flex-shrink: 0;
    }
    .src-name { font-size: 0.8rem; color: var(--cream); }
    .src-pgn  {
      font-size: 0.7rem;
      color: var(--muted);
      font-family: 'SF Mono', Consolas, monospace;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .sim-bar { width: 24px; height: 3px; background: var(--border); border-radius: 2px; flex-shrink:0; }
    .sim-fill { height: 100%; background: var(--gold); border-radius: 2px; }

    /* ── Right Panel ── */
    .right {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    #c { width: 100%; height: 100%; display: block; }

    /* board controls overlay */
    .controls {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 0.75rem 1.5rem 1rem;
      background: linear-gradient(transparent, rgba(10,10,15,.92));
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.9rem;
    }
    .ctrl {
      width: 34px; height: 34px;
      border-radius: 50%;
      background: rgba(255,255,255,.05);
      border: 1px solid var(--border);
      color: var(--cream);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      transition: all 0.15s;
    }
    .ctrl:hover:not(:disabled) { background: rgba(212,175,55,.15); border-color: var(--gold-dim); }
    .ctrl:disabled { opacity: 0.25; cursor: not-allowed; }

    .move-info { text-align: center; min-width: 190px; }
    .op-name {
      font-family: 'Cinzel', serif;
      font-size: 0.82rem;
      color: var(--gold);
      margin-bottom: 0.15rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .move-display { font-size: 0.74rem; color: var(--muted); font-family: monospace; }

    .hint {
      position: absolute;
      top: 0.75rem; right: 1rem;
      font-size: 0.68rem;
      color: var(--muted);
      pointer-events: none;
    }

    /* ── Mobile / portrait: stack chat above board ── */
    @media (max-width: 768px) {
      html, body { height: auto; overflow: visible; }
      main {
        flex-direction: column;
        overflow: visible;
        height: auto;
      }
      .left {
        width: 100%;
        height: auto;
        max-height: none;
        overflow-y: visible;
        border-right: none;
        border-bottom: 1px solid var(--border);
      }
      .right {
        flex: none;
        width: 100%;
        height: 60vh;
        min-height: 340px;
      }
    }
  </style>
</head>
<body>

<nav>
  <div class="logo">♟ CHESS<span>OPENINGS</span></div>
  <div class="status">
    <div class="dot" id="dot"></div>
    <span id="st">Connecting…</span>
  </div>
</nav>

<main>
  <!-- ── Left ── -->
  <div class="left">

    <div>
      <div class="lbl">Try asking</div>
      <div class="chips">
        <button class="chip" onclick="fillQ(this)">What is the Sicilian Defense?</button>
        <button class="chip" onclick="fillQ(this)">Tell me about the Ruy Lopez</button>
        <button class="chip" onclick="fillQ(this)">Best openings for beginners</button>
        <button class="chip" onclick="fillQ(this)">What is the King's Gambit?</button>
        <button class="chip" onclick="fillQ(this)">Sharpest reply to 1.e4</button>
      </div>
    </div>

    <div>
      <div class="lbl">Your question</div>
      <div class="input-wrap">
        <textarea id="q" placeholder="Ask about any chess opening…"></textarea>
        <button class="send" id="send" onclick="ask()">
          <svg viewBox="0 0 16 16"><path d="M1 1l14 7-14 7V9l10-1L1 7V1z"/></svg>
        </button>
      </div>
    </div>

    <div class="thinking" id="thinking">
      <div class="dots"><span></span><span></span><span></span></div>
      <span>Analyzing…</span>
    </div>

    <div class="answer-card" id="ac">
      <div class="lbl">Answer</div>
      <div class="answer-text" id="at"></div>
    </div>

    <div id="ss" style="display:none">
      <div class="lbl">Openings retrieved — click to view on board</div>
      <div style="display:flex;flex-direction:column;gap:.45rem" id="sl"></div>
    </div>

  </div>

  <!-- ── Right: 3D Board ── -->
  <div class="right">
    <canvas id="c"></canvas>
    <div class="hint">Drag to rotate · Scroll to zoom</div>
    <div class="controls">
      <button class="ctrl" id="b0" onclick="goStart()" title="Start">⏮</button>
      <button class="ctrl" id="b1" onclick="goBack()"  title="Back">◀</button>
      <div class="move-info">
        <div class="op-name" id="opname">Select an opening</div>
        <div class="move-display" id="mvdisp">—</div>
      </div>
      <button class="ctrl" id="b2" onclick="goFwd()"   title="Next">▶</button>
      <button class="ctrl" id="b3" onclick="goEnd()"   title="End">⏭</button>
    </div>
  </div>
</main>

<!-- Three.js + chess.js importmap -->
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
    "chess.js": "https://esm.sh/chess.js@0.10.3"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { Chess } from 'chess.js';

// ── Renderer ────────────────────────────────────────────────
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;
renderer.setClearColor(0x0a0a0f);

// ── Scene & Camera ───────────────────────────────────────────
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0a0a0f, 0.028);

const camera = new THREE.PerspectiveCamera(42, 1, 0.1, 120);
camera.position.set(3.5, 8.5, 11);
camera.lookAt(3.5, 0, 3.5);

const controls = new OrbitControls(camera, canvas);
controls.target.set(3.5, 0, 3.5);
controls.enableDamping = true;
controls.dampingFactor = 0.07;
controls.minDistance = 4;
controls.maxDistance = 22;
controls.maxPolarAngle = Math.PI / 2.05;
controls.update();

// ── Lights ───────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xfff5e0, 0.55));

const key = new THREE.DirectionalLight(0xfffaee, 2.0);
key.position.set(7, 14, 9);
key.castShadow = true;
key.shadow.mapSize.set(2048, 2048);
key.shadow.camera.near = 0.5;
key.shadow.camera.far = 50;
key.shadow.camera.left = key.shadow.camera.bottom = -10;
key.shadow.camera.right = key.shadow.camera.top = 10;
key.shadow.bias = -0.0008;
scene.add(key);

const fill = new THREE.DirectionalLight(0xc8d8ff, 0.35);
fill.position.set(-7, 6, -4);
scene.add(fill);

const rim = new THREE.DirectionalLight(0xffd090, 0.25);
rim.position.set(0, 5, -12);
scene.add(rim);

// ── Materials ────────────────────────────────────────────────
const mLS  = new THREE.MeshStandardMaterial({ color: 0xf0d9b5, roughness: 0.82 });
const mDS  = new THREE.MeshStandardMaterial({ color: 0xb58863, roughness: 0.82 });
const mFrm = new THREE.MeshStandardMaterial({ color: 0x2e1608, roughness: 0.70, metalness: 0.05 });
const mTbl = new THREE.MeshStandardMaterial({ color: 0x0d0d14, roughness: 1.0 });
const mHL  = new THREE.MeshStandardMaterial({
  color: 0xd4af37, roughness: 0.4, metalness: 0.5,
  transparent: true, opacity: 0.42,
  depthWrite: false,
});

// cel-shaded (toon) piece materials: a stepped gradient ramp instead of
// smooth PBR lighting, for a distinct "cool" stylized look
function gradientRamp(steps) {
  const data = new Uint8Array(steps);
  for (let i = 0; i < steps; i++) data[i] = Math.round((255 * (i + 1)) / steps);
  const tex = new THREE.DataTexture(data, steps, 1, THREE.RedFormat);
  tex.needsUpdate = true;
  tex.magFilter = THREE.NearestFilter;
  tex.minFilter = THREE.NearestFilter;
  return tex;
}
const toonRamp = gradientRamp(4);
const mW = new THREE.MeshToonMaterial({ color: 0xece6d0, gradientMap: toonRamp });
const mB = new THREE.MeshToonMaterial({ color: 0x2a140b, gradientMap: toonRamp });

// black rim outline for the cel-shaded look: an inverted, slightly
// enlarged backface-only shell behind every piece mesh
const mOutline = new THREE.MeshBasicMaterial({ color: 0x08080a, side: THREE.BackSide });
function withOutline(mesh, group) {
  mesh.castShadow = true;
  const outline = new THREE.Mesh(mesh.geometry, mOutline);
  outline.position.copy(mesh.position);
  outline.rotation.copy(mesh.rotation);
  outline.scale.copy(mesh.scale).multiplyScalar(1.07);
  group.add(outline);
  group.add(mesh);
  return mesh;
}

// ── Board ────────────────────────────────────────────────────
const board = new THREE.Group();
scene.add(board);

// table
const tbl = new THREE.Mesh(new THREE.BoxGeometry(18, 0.18, 18), mTbl);
tbl.position.set(3.5, -0.3, 3.5);
tbl.receiveShadow = true;
board.add(tbl);

// frame
const frm = new THREE.Mesh(new THREE.BoxGeometry(9.4, 0.14, 9.4), mFrm);
frm.position.set(3.5, -0.07, 3.5);
frm.receiveShadow = true;
board.add(frm);

// squares
const sqG = new THREE.BoxGeometry(1, 0.07, 1);
for (let r = 0; r < 8; r++) {
  for (let c = 0; c < 8; c++) {
    const m = new THREE.Mesh(sqG, (r + c) % 2 === 0 ? mLS : mDS);
    m.position.set(c, 0, r);
    m.receiveShadow = true;
    board.add(m);
  }
}

// move highlights (from / to)
const hlG = new THREE.BoxGeometry(0.97, 0.075, 0.97);
const hl1 = new THREE.Mesh(hlG, mHL); hl1.visible = false; board.add(hl1);
const hl2 = new THREE.Mesh(hlG, mHL); hl2.visible = false; board.add(hl2);

// ── Piece Profiles (LatheGeometry) ───────────────────────────
function v2(x, y) { return new THREE.Vector2(x, y); }

const PROF = {
  p: [v2(0,.00),v2(.27,.00),v2(.29,.05),v2(.26,.09),v2(.16,.15),v2(.13,.23),v2(.13,.30),
      v2(.17,.36),v2(.21,.44),v2(.21,.52),v2(.17,.59),v2(.09,.65),v2(.04,.68),v2(0,.68)],
  r: [v2(0,.00),v2(.27,.00),v2(.29,.05),v2(.26,.09),v2(.19,.15),v2(.17,.22),v2(.17,.62),
      v2(.21,.66),v2(.25,.70),v2(.25,.82),v2(0,.82)],
  n: [v2(0,.00),v2(.27,.00),v2(.29,.05),v2(.26,.09),v2(.18,.15),v2(.15,.25),v2(.15,.42),v2(0,.42)],
  b: [v2(0,.00),v2(.26,.00),v2(.28,.05),v2(.25,.09),v2(.15,.15),v2(.12,.23),v2(.12,.33),
      v2(.17,.39),v2(.20,.48),v2(.19,.59),v2(.13,.68),v2(.07,.77),v2(.04,.84),
      v2(.06,.90),v2(.08,.94),v2(.05,.98),v2(0,.98)],
  q: [v2(0,.00),v2(.29,.00),v2(.31,.05),v2(.28,.09),v2(.18,.16),v2(.14,.26),v2(.14,.36),
      v2(.19,.43),v2(.23,.53),v2(.22,.62),v2(.17,.68),v2(.15,.75),v2(.17,.81),
      v2(.21,.86),v2(.21,.92),v2(.15,.98),v2(.08,1.03),v2(.03,1.07),v2(0,1.07)],
  k: [v2(0,.00),v2(.29,.00),v2(.31,.05),v2(.28,.09),v2(.18,.16),v2(.14,.26),v2(.14,.36),
      v2(.19,.43),v2(.23,.53),v2(.22,.62),v2(.17,.68),v2(.13,.74),v2(.11,.82),v2(0,.82)],
};

const SEGS = 30;
const GEOS = {};
for (const [t, pts] of Object.entries(PROF)) {
  GEOS[t] = new THREE.LatheGeometry(pts, SEGS);
}

// extra geometry for knight head, rook battlements, king cross, etc.
const knightHeadG    = new THREE.BoxGeometry(0.28, 0.50, 0.36);
const knightMuzzleG  = new THREE.BoxGeometry(0.17, 0.19, 0.24);
const knightEarG     = new THREE.BoxGeometry(0.08, 0.17, 0.08);
const crossHG        = new THREE.BoxGeometry(0.34, 0.10, 0.10);
const crossVG        = new THREE.BoxGeometry(0.10, 0.30, 0.10);
const mitreBallG     = new THREE.SphereGeometry(0.09, 16, 16);
const mitreSlitG     = new THREE.BoxGeometry(0.035, 0.26, 0.19);
const coronetSpikeG  = new THREE.ConeGeometry(0.05, 0.20, 6);
const battG          = new THREE.BoxGeometry(0.12, 0.14, 0.12);
const pawnCapG       = new THREE.SphereGeometry(0.13, 16, 16);

// ── Create Piece Mesh ─────────────────────────────────────────
function makePiece(type, color) {
  const mat = color === 'w' ? mW : mB;
  const g = new THREE.Group();

  const add = (m) => withOutline(m, g);

  if (type === 'n') {
    add(new THREE.Mesh(GEOS.n, mat));
    const head = new THREE.Mesh(knightHeadG, mat);
    head.position.set(0, 0.72, 0.06);
    head.rotation.x = -0.34;
    add(head);
    const muzzle = new THREE.Mesh(knightMuzzleG, mat);
    muzzle.position.set(0, 0.62, 0.24);
    muzzle.rotation.x = -0.12;
    add(muzzle);
    for (const side of [-1, 1]) {
      const ear = new THREE.Mesh(knightEarG, mat);
      ear.position.set(side * 0.08, 0.98, -0.03);
      ear.rotation.z = side * 0.35;
      add(ear);
    }
    if (color === 'b') g.rotation.y = Math.PI;

  } else if (type === 'k') {
    add(new THREE.Mesh(GEOS.k, mat));
    const ch = new THREE.Mesh(crossHG, mat); ch.position.set(0, 0.97, 0); add(ch);
    const cv = new THREE.Mesh(crossVG, mat); cv.position.set(0, 1.07, 0); add(cv);

  } else if (type === 'q') {
    add(new THREE.Mesh(GEOS.q, mat));
    // coronet of spikes ringing the crown — the queen's distinctive "tell"
    const N = 6;
    for (let i = 0; i < N; i++) {
      const a = (i / N) * Math.PI * 2;
      const spike = new THREE.Mesh(coronetSpikeG, mat);
      spike.position.set(Math.cos(a) * 0.15, 1.06, Math.sin(a) * 0.15);
      add(spike);
    }

  } else if (type === 'b') {
    add(new THREE.Mesh(GEOS.b, mat));
    const ball = new THREE.Mesh(mitreBallG, mat); ball.position.set(0, 1.02, 0); add(ball);
    // classic bishop's mitre notch — a deep diagonal cut, the bishop's "tell"
    const slit = new THREE.Mesh(mitreSlitG, mat);
    slit.position.set(0, 1.02, 0.09);
    slit.rotation.z = 0.55;
    add(slit);

  } else if (type === 'r') {
    add(new THREE.Mesh(GEOS.r, mat));
    for (let i = -1; i <= 1; i++) {
      const batt = new THREE.Mesh(battG, mat);
      batt.position.set(i * 0.16, 0.90, 0);
      add(batt);
    }
  } else if (type === 'p') {
    add(new THREE.Mesh(GEOS.p, mat));
    const cap = new THREE.Mesh(pawnCapG, mat); cap.position.set(0, 0.68, 0); add(cap);
  } else {
    add(new THREE.Mesh(GEOS[type], mat));
  }

  return g;
}

// ── Board State ───────────────────────────────────────────────
const BOARD_Y = 0.07; // top of squares
let pieces = [];

function clearPieces() {
  pieces.forEach(p => board.remove(p));
  pieces = [];
}

function renderPos(chessBoard, lastMove) {
  clearPieces();
  hl1.visible = hl2.visible = false;

  if (lastMove) {
    // from/to are in chess notation: "e2" → col 4 file, rank 2
    const f = squareToWorld(lastMove.from);
    const t = squareToWorld(lastMove.to);
    hl1.position.set(f.x, BOARD_Y, f.z); hl1.visible = true;
    hl2.position.set(t.x, BOARD_Y, t.z); hl2.visible = true;
  }

  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {
      const sq = chessBoard[r][c];
      if (!sq) continue;
      const p = makePiece(sq.type, sq.color);
      const worldZ = 7 - r;
      p.position.set(c, BOARD_Y, worldZ);
      board.add(p);
      pieces.push(p);
    }
  }
}

function squareToWorld(sq) {
  const file = sq.charCodeAt(0) - 97; // a=0, b=1...
  const rank = parseInt(sq[1]) - 1;   // 1=0, 8=7
  return { x: file, z: rank };
}

// ── Move Stepping ─────────────────────────────────────────────
let moves = [], idx = 0, chess = null;

function loadOpening(name, pgn) {
  document.getElementById('opname').textContent = name;
  const tmp = new Chess();
  tmp.load_pgn(pgn);
  moves = tmp.history({ verbose: true });
  idx = 0;
  chess = new Chess();
  renderPos(chess.board(), null);
  syncUI();
}

function syncUI() {
  const el = document.getElementById('mvdisp');
  if (!moves.length) { el.textContent = '—'; }
  else if (idx === 0) { el.textContent = 'Starting position'; }
  else {
    const mv = moves[idx - 1];
    const num = Math.ceil(idx / 2);
    el.textContent = `${num}${idx % 2 === 1 ? '.' : '…'} ${mv.san}`;
  }
  ['b0','b1'].forEach(id => document.getElementById(id).disabled = idx === 0);
  ['b2','b3'].forEach(id => document.getElementById(id).disabled = !moves.length || idx >= moves.length);
}

window.goFwd = () => {
  if (!chess || idx >= moves.length) return;
  const mv = moves[idx]; chess.move(mv.san); idx++;
  renderPos(chess.board(), mv); syncUI();
};
window.goBack = () => {
  if (!chess || idx === 0) return;
  idx--; chess = new Chess();
  for (let i = 0; i < idx; i++) chess.move(moves[i].san);
  renderPos(chess.board(), idx > 0 ? moves[idx - 1] : null); syncUI();
};
window.goStart = () => {
  if (!chess) return;
  idx = 0; chess = new Chess();
  renderPos(chess.board(), null); syncUI();
};
window.goEnd = () => {
  if (!chess) return;
  chess = new Chess();
  moves.forEach(m => chess.move(m.san));
  idx = moves.length;
  renderPos(chess.board(), moves.length ? moves[moves.length - 1] : null); syncUI();
};

// expose for API script
window.loadOpening = loadOpening;

// ── Resize ────────────────────────────────────────────────────
function resize() {
  const w = canvas.clientWidth, h = canvas.clientHeight;
  if (canvas.width !== w || canvas.height !== h) {
    renderer.setSize(w, h, false);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  }
}

// ── Init & Loop ───────────────────────────────────────────────
chess = new Chess();
renderPos(chess.board(), null);
syncUI();

;(function loop() {
  requestAnimationFrame(loop);
  resize();
  controls.update();
  renderer.render(scene, camera);
})();
</script>

<script>
// ── API ───────────────────────────────────────────────────────
const API = window.location.hostname === 'localhost'
  ? 'http://localhost:8001'
  : 'https://chessopenings-ptkm.onrender.com';

// health ping
fetch(`${API}/health`)
  .then(r => r.ok ? r.json() : Promise.reject())
  .then(() => {
    document.getElementById('dot').className = 'dot ok';
    document.getElementById('st').textContent = 'API connected';
  })
  .catch(() => {
    document.getElementById('dot').className = 'dot err';
    document.getElementById('st').textContent = 'API offline';
  });

window.fillQ = btn => {
  document.getElementById('q').value = btn.textContent;
  ask();
};

window.ask = async () => {
  const q = document.getElementById('q').value.trim();
  if (!q) return;

  const send    = document.getElementById('send');
  const think   = document.getElementById('thinking');
  const ac      = document.getElementById('ac');
  const at      = document.getElementById('at');
  const ss      = document.getElementById('ss');
  const sl      = document.getElementById('sl');

  send.disabled = true;
  think.classList.add('on');
  ac.classList.remove('on');
  ss.style.display = 'none';

  try {
    const res = await fetch(`${API}/ask`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: q })
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    at.className = 'answer-text';
    at.textContent = data.answer;
    ac.classList.add('on');

    if (data.sources?.length) {
      sl.innerHTML = data.sources.map((s, i) => `
        <div class="source-card" data-i="${i}"
             onclick="pickSource(this,'${esc(s.name)}','${esc(s.pgn)}')">
          <span class="eco">${s.eco}</span>
          <div style="flex:1;min-width:0">
            <div class="src-name">${s.name}</div>
            <div class="src-pgn">${s.pgn}</div>
          </div>
          <div class="sim-bar">
            <div class="sim-fill" style="width:${Math.round(s.similarity*100)}%"></div>
          </div>
        </div>`).join('');
      ss.style.display = 'block';
      // auto-load top result
      pickSource(sl.querySelector('.source-card'), data.sources[0].name, data.sources[0].pgn);
    }
  } catch (e) {
    at.className = 'answer-text err';
    at.textContent = `Error: ${e.message}`;
    ac.classList.add('on');
  } finally {
    think.classList.remove('on');
    send.disabled = false;
  }
};

window.pickSource = (el, name, pgn) => {
  document.querySelectorAll('.source-card').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  window.loadOpening?.(name, pgn);
};

function esc(s) {
  return (s || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'");
}

document.getElementById('q').addEventListener('keydown', e => {
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) window.ask();
});
</script>

</body>
