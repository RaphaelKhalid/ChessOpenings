<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Chess Opening Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg:       #0a0a0f;
      --surf:     #111118;
      --surf2:    #18181f;
      --border:   #252530;
      --gold:     #d4af37;
      --gold-dim: #7a6318;
      --cream:    #f0ead6;
      --muted:    #55526a;
      --red:      #f87171;
    }

    html, body { height: 100%; overflow: hidden; }

    @keyframes pageFade { from { opacity: 0; } to { opacity: 1; } }

    body {
      background: var(--bg);
      color: var(--cream);
      font-family: 'Inter', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      animation: pageFade .4s ease both;
    }

    :focus-visible { outline: 2px solid var(--gold-dim); outline-offset: 2px; }

    /* ── shared thin scrollbar ── */
    .scroll-thin { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
    .scroll-thin::-webkit-scrollbar { width: 3px; height: 3px; }
    .scroll-thin::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .scroll-thin::-webkit-scrollbar-track { background: transparent; }

    /* ── Nav ── */
    nav {
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.5rem;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .logo {
      font-family: 'Cinzel', serif;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      color: var(--gold);
    }
    .logo span { color: var(--cream); opacity: 0.55; font-weight: 400; }

    .navlink {
      font-size: 0.78rem; color: var(--muted); text-decoration: none;
      border: 1px solid var(--border); border-radius: 6px; padding: 0.35rem 0.7rem;
      transition: color .15s, border-color .15s, background-color .15s, transform .15s;
      touch-action: manipulation;
    }
    .navlink:hover { color: var(--cream); border-color: var(--gold-dim); }
    .navlink:active { transform: scale(.97); }

    .status {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      font-size: 0.72rem;
      color: var(--muted);
    }
    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
    }
    .dot.ok  { background: #4ade80; }
    .dot.err { background: var(--red); }

    /* ── Layout ── */
    main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ── Left Panel ── */
    .left {
      width: 380px;
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      padding: 1.25rem;
      gap: 1.1rem;
    }

    .lbl {
      font-size: 0.67rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.55rem;
    }

    /* chips */
    .chips { display: flex; flex-wrap: wrap; gap: 0.4rem; }
    .chip {
      padding: 0.3rem 0.65rem;
      min-height: 32px;
      display: inline-flex;
      align-items: center;
      border: 1px solid var(--border);
      border-radius: 100px;
      font-size: 0.75rem;
      color: var(--muted);
      cursor: pointer;
      background: transparent;
      font-family: inherit;
      transition: color .15s, border-color .15s, background-color .15s, transform .15s;
      touch-action: manipulation;
    }
    .chip:hover {
      border-color: var(--gold-dim);
      color: var(--cream);
      background: rgba(212,175,55,0.07);
    }
    .chip:active { transform: scale(.97); }

    /* input */
    .input-wrap { position: relative; }
    textarea {
      width: 100%;
      min-height: 76px;
      padding: 0.8rem 3.4rem 0.8rem 0.9rem;
      background: var(--surf2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--cream);
      font-family: inherit;
      font-size: 0.9rem;
      line-height: 1.5;
      resize: none;
      outline: none;
      transition: border-color 0.15s;
    }
    textarea:focus { border-color: var(--gold-dim); }
    textarea::placeholder { color: var(--muted); }

    .send {
      position: absolute;
      right: 0.5rem;
      bottom: 0.5rem;
      width: 44px; height: 44px;
      border-radius: 8px;
      background: var(--gold);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, opacity 0.15s, transform .15s;
      touch-action: manipulation;
    }
    .send:hover { background: #e8c94a; }
    .send:active { transform: scale(.97); }
    .send:disabled { opacity: 0.35; cursor: not-allowed; }
    .send svg { width: 15px; height: 15px; fill: #0a0a0f; }

    /* thinking */
    .thinking {
      display: none;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.8rem;
      color: var(--muted);
      flex-wrap: wrap;
    }
    .thinking.on { display: flex; }
    .dots { display: flex; gap: 3px; }
    .dots span {
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--gold);
      animation: blink 1.2s ease-in-out infinite;
    }
    .dots span:nth-child(2) { animation-delay: .2s; }
    .dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes blink {
      0%,80%,100% { opacity:.2; transform:scale(.8); }
      40%          { opacity:1;  transform:scale(1);  }
    }
    .think-elapsed { color: var(--muted); opacity: .75; }

    /* answer */
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .answer-card {
      background: var(--surf);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.9rem;
      display: none;
    }
    .answer-card.on { display: block; animation: cardIn .25s ease both; }
    .answer-text { font-size: 0.88rem; line-height: 1.7; }
    .answer-text strong, .answer-text b { color: var(--gold); font-weight: 600; }
    .answer-text em, .answer-text i { color: var(--cream); opacity: .92; font-style: italic; }
    .answer-text code {
      font-family: 'SF Mono', Consolas, monospace;
      background: var(--surf2);
      padding: 0.1rem 0.35rem;
      border-radius: 3px;
      font-size: 0.85em;
    }
    .answer-text ul { padding-left: 1.1em; margin: 0.4em 0; }
    .answer-text li { margin-bottom: 0.25em; }
    .answer-text p { margin-bottom: 0.5em; }
    .answer-text p:last-child { margin-bottom: 0; }
    .answer-text h3, .answer-text h4 {
      font-family: 'Cinzel', serif; color: var(--gold);
      font-size: 0.95em; margin: 0.6em 0 0.3em;
    }
    .err { color: var(--red); }

    /* source cards */
    @keyframes cardStagger {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .source-card {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      padding: 0.65rem 0.8rem;
      min-height: 48px;
      background: var(--surf2);
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      transition: border-color .15s, background-color .15s, transform .15s;
      animation: cardStagger .3s ease both;
      touch-action: manipulation;
    }
    .source-card:hover  { border-color: var(--gold-dim); background: rgba(212,175,55,.04); }
    .source-card.active { border-color: var(--gold);     background: rgba(212,175,55,.09); }
    .source-card:active { transform: scale(.97); }

    .eco {
      font-family: 'Cinzel', serif;
      font-size: 0.68rem;
      font-weight: 600;
      color: var(--gold);
      background: rgba(212,175,55,.12);
      border: 1px solid rgba(212,175,55,.22);
      border-radius: 4px;
      padding: 0.18rem 0.4rem;
      letter-spacing: .04em;
      flex-shrink: 0;
      transition: color .15s, border-color .15s;
    }
    .src-name { font-size: 0.8rem; color: var(--cream); }
    .src-pgn  {
      font-size: 0.7rem;
      color: var(--muted);
      font-family: 'SF Mono', Consolas, monospace;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* similarity ring */
    .sim-ring { position: relative; width: 22px; height: 22px; flex-shrink: 0; }
    .sim-ring svg { position: absolute; inset: 0; }
    .sim-pct {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.55rem; color: var(--cream); font-family: 'SF Mono', Consolas, monospace;
    }

    /* skeleton loading cards */
    .skeleton-card { cursor: default; animation: cardStagger .3s ease both; }
    .skeleton-shimmer {
      background: linear-gradient(90deg, var(--surf2) 25%, rgba(255,255,255,.07) 50%, var(--surf2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s ease-in-out infinite;
      border-radius: 4px;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .skel-eco  { width: 30px; height: 18px; }
    .skel-line1 { height: 11px; width: 70%; margin-bottom: 7px; }
    .skel-line2 { height: 9px;  width: 45%; }

    /* decision tree */
    #treewrap { display: none; }
    .tree-scroll {
      overflow-x: auto;
      overflow-y: hidden;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surf);
      padding: 0.6rem 0.4rem;
    }
    .tree-scroll svg { display: block; }
    .tree-scroll text {
      font-family: 'SF Mono', Consolas, monospace;
      font-size: 0.72rem;
      pointer-events: none;
    }
    .tree-scroll text.tleaf { font-size: 0.6rem; fill: var(--gold); }
    .tnode { cursor: pointer; touch-action: manipulation; }
    .tnode .tchip { transition: filter .15s, stroke .15s, stroke-width .15s; }
    .tnode:hover .tchip { filter: brightness(1.3); }
    .tnode.active .tchip { stroke: var(--gold); stroke-width: 2; }
    .tedge { transition: stroke .15s, stroke-width .15s; }
    .tedge.active { stroke: var(--gold) !important; stroke-width: 2; }

    /* ── Right Panel ── */
    .right {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    #c { width: 100%; height: 100%; display: block; }

    .vignette {
      position: absolute; inset: 0;
      pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 55%, rgba(10,10,15,.55) 100%);
    }

    .hint {
      position: absolute;
      top: 0.75rem; right: 1rem;
      font-size: 0.68rem;
      color: var(--muted);
      pointer-events: none;
    }

    .flip-btn {
      position: absolute;
      top: 2.3rem; right: 1rem;
      width: 36px; height: 36px;
      border-radius: 50%;
      background: rgba(255,255,255,.05);
      border: 1px solid var(--border);
      color: var(--cream);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
      transition: background-color .15s, border-color .15s, transform .15s;
      touch-action: manipulation;
      z-index: 5;
    }
    .flip-btn:hover { background: rgba(212,175,55,.15); border-color: var(--gold-dim); }
    .flip-btn:active { transform: scale(.97); }

    /* top-center opening placard */
    .placard {
      position: absolute;
      top: 0.75rem; left: 50%;
      transform: translateX(-50%);
      max-width: 78%;
      text-align: center;
      background: rgba(10,10,15,.6);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.5rem 1.1rem;
      opacity: 0;
      transition: opacity .3s;
      pointer-events: none;
    }
    .placard.on { opacity: 1; }
    .op-name {
      font-family: 'Cinzel', serif;
      font-size: 0.82rem;
      color: var(--gold);
      margin-bottom: 0.15rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .move-display { font-size: 0.74rem; color: var(--muted); font-family: monospace; }

    /* move pill strip */
    .move-strip {
      position: absolute;
      bottom: calc(88px + env(safe-area-inset-bottom));
      left: 50%;
      transform: translateX(-50%);
      max-width: 70%;
      display: none;
      align-items: center;
      gap: 0.3rem;
      overflow-x: auto;
      padding: 0.25rem 0.2rem;
    }
    .movepill {
      flex-shrink: 0;
      min-height: 32px;
      padding: 0.3rem 0.55rem;
      display: flex; align-items: center;
      border-radius: 6px;
      font-family: 'SF Mono', Consolas, monospace;
      font-size: 0.72rem;
      background: rgba(255,255,255,.05);
      border: 1px solid var(--border);
      color: var(--cream);
      cursor: pointer;
      white-space: nowrap;
      transition: background-color .15s, border-color .15s, color .15s, transform .15s;
      touch-action: manipulation;
    }
    .movepill:hover { border-color: var(--gold-dim); }
    .movepill:active { transform: scale(.97); }
    .movepill.num { background: none; border: none; color: var(--muted); cursor: default; padding: 0.3rem 0.1rem; min-height: auto; }
    .movepill.current { background: var(--gold); color: #1a1408; border-color: var(--gold); font-weight: 600; }

    /* floating glass control dock */
    .dock {
      position: absolute;
      bottom: calc(14px + env(safe-area-inset-bottom));
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.5rem 0.7rem;
      border-radius: 999px;
      background: rgba(17,17,24,.72);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid var(--border);
      box-shadow: 0 8px 30px rgba(0,0,0,.45);
    }
    .ctrl {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: rgba(255,255,255,.05);
      border: 1px solid var(--border);
      color: var(--cream);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      transition: background-color .15s, border-color .15s, transform .15s, opacity .15s;
      touch-action: manipulation;
    }
    .ctrl:hover:not(:disabled) { background: rgba(212,175,55,.15); border-color: var(--gold-dim); }
    .ctrl:active:not(:disabled) { transform: scale(.97); }
    .ctrl:disabled { opacity: 0.25; cursor: not-allowed; }

    /* ── Mobile / portrait: stack chat above board ── */
    @media (max-width: 768px) {
      html, body { height: auto; overflow: visible; }
      main {
        flex-direction: column;
        overflow: visible;
        height: auto;
      }
      .left {
        width: 100%;
        height: auto;
        max-height: none;
        overflow-y: visible;
        border-right: none;
        border-bottom: 1px solid var(--border);
      }
      .right {
        flex: none;
        width: 100%;
        height: 60vh;
        min-height: 340px;
      }
      .move-strip { max-width: 88%; }
    }
  </style>
</head>
<body>

<nav>
  <div class="logo">♟ CHESS<span>OPENINGS</span></div>
  <div style="display:flex;align-items:center;gap:1rem">
    <a class="navlink" href="/play">Play with a Friend</a>
    <div class="status">
      <div class="dot" id="dot"></div>
      <span id="st">Connecting…</span>
    </div>
  </div>
</nav>

<main>
  <!-- ── Left ── -->
  <div class="left scroll-thin">

    <div>
      <div class="lbl">Try asking</div>
      <div class="chips">
        <button class="chip" onclick="fillQ(this)">What is the Sicilian Defense?</button>
        <button class="chip" onclick="fillQ(this)">Tell me about the Ruy Lopez</button>
        <button class="chip" onclick="fillQ(this)">Best openings for beginners</button>
        <button class="chip" onclick="fillQ(this)">What is the King's Gambit?</button>
        <button class="chip" onclick="fillQ(this)">Sharpest reply to 1.e4</button>
      </div>
    </div>

    <div>
      <div class="lbl">Your question</div>
      <div class="input-wrap">
        <textarea id="q" placeholder="Ask about any chess opening…"></textarea>
        <button class="send" id="send" onclick="ask()">
          <svg viewBox="0 0 16 16"><path d="M1 1l14 7-14 7V9l10-1L1 7V1z"/></svg>
        </button>
      </div>
    </div>

    <div class="thinking" id="thinking">
      <div class="dots"><span></span><span></span><span></span></div>
      <span id="thinkMsg">Analyzing…</span><span class="think-elapsed" id="thinkElapsed"></span>
    </div>

    <div class="answer-card" id="ac">
      <div class="lbl">Answer</div>
      <div class="answer-text" id="at"></div>
    </div>

    <div id="ss" style="display:none">
      <div class="lbl">Openings retrieved — click to view on board</div>
      <div style="display:flex;flex-direction:column;gap:.45rem" id="sl"></div>
    </div>

    <div id="treewrap">
      <div class="lbl">Decision tree — tap a move to explore</div>
      <div class="tree-scroll scroll-thin"></div>
    </div>

  </div>

  <!-- ── Right: 3D Board ── -->
  <div class="right">
    <canvas id="c"></canvas>
    <div class="vignette"></div>
    <div class="hint">Drag to rotate · Scroll to zoom</div>
    <button class="flip-btn" onclick="flipCamera()" title="Flip view" aria-label="Flip board view">⇅</button>

    <div class="placard" id="placard">
      <div class="op-name" id="opname">Select an opening</div>
      <div class="move-display" id="mvdisp">—</div>
    </div>

    <div class="move-strip scroll-thin" id="movestrip"></div>

    <div class="dock">
      <button class="ctrl" id="b0" onclick="goStart()" title="Start">⏮</button>
      <button class="ctrl" id="b1" onclick="goBack()"  title="Back">◀</button>
      <button class="ctrl" id="bplay" onclick="toggleAutoplay()" title="Autoplay">▶︎</button>
      <button class="ctrl" id="b2" onclick="goFwd()"   title="Next">▶</button>
      <button class="ctrl" id="b3" onclick="goEnd()"   title="End">⏭</button>
    </div>
  </div>
</main>

<!-- Three.js + chess.js importmap -->
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
    "chess.js": "https://esm.sh/chess.js@0.10.3"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
import { Chess } from 'chess.js';

// ── Renderer ────────────────────────────────────────────────
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;
renderer.setClearColor(0x0a0a0f);

// ── Scene & Camera ───────────────────────────────────────────
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0a0a0f, 0.028);

const camera = new THREE.PerspectiveCamera(42, 1, 0.1, 120);
// Greet from White's side of the board by default.
camera.position.set(3.5, 8.5, -4);
camera.lookAt(3.5, 0, 3.5);

const controls = new OrbitControls(camera, canvas);
controls.target.set(3.5, 0, 3.5);
controls.enableDamping = true;
controls.dampingFactor = 0.07;
controls.minDistance = 4;
controls.maxDistance = 22;
controls.maxPolarAngle = Math.PI / 2.05;
controls.update();

// ── Ambient idle camera drift (stops permanently on first canvas interaction) ──
let idleStopped = false;
let idleStart = performance.now();
let idleBaseAngle, idleRadius, idleHeight;
{
  const rel = camera.position.clone().sub(controls.target);
  idleRadius = Math.sqrt(rel.x * rel.x + rel.z * rel.z);
  idleHeight = rel.y;
  idleBaseAngle = Math.atan2(rel.z, rel.x);
}
canvas.addEventListener('pointerdown', () => { idleStopped = true; }, { once: true });
canvas.addEventListener('wheel', () => { idleStopped = true; }, { once: true, passive: true });

// ── Camera flip (fly to the mirrored side) ───────────────────
let flightActive = false;
let currentCameraSide = 'white'; // matches default (3.5, 8.5, -4)

function flipCamera() {
  if (flightActive) return;
  flightActive = true;
  controls.enabled = false;

  const target = controls.target.clone();
  const rel = camera.position.clone().sub(target);
  const radius = Math.sqrt(rel.x * rel.x + rel.z * rel.z);
  const height = rel.y;
  const startAngle = Math.atan2(rel.z, rel.x);

  currentCameraSide = currentCameraSide === 'white' ? 'black' : 'white';
  const canonicalAngle = currentCameraSide === 'white' ? -Math.PI / 2 : Math.PI / 2;
  let delta = (((canonicalAngle - startAngle + Math.PI) % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2) - Math.PI;
  if (Math.abs(delta) < 0.01) delta = Math.PI;

  const dur = 800;
  const t0 = performance.now();

  function step(now) {
    const t = Math.min(1, (now - t0) / dur);
    const e = t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2; // ease-in-out cubic
    const ang = startAngle + delta * e;
    camera.position.set(
      target.x + Math.cos(ang) * radius,
      target.y + height,
      target.z + Math.sin(ang) * radius
    );
    camera.lookAt(target);
    if (t < 1) {
      requestAnimationFrame(step);
    } else {
      flightActive = false;
      controls.enabled = true;
      controls.update();
      idleBaseAngle = canonicalAngle;
      idleRadius = radius;
      idleHeight = height;
      idleStart = performance.now();
    }
  }
  requestAnimationFrame(step);
}
window.flipCamera = flipCamera;

// ── Cel-shaded ink pass ─────────────────────────────────────────
// Detects *geometric* edges (surface-normal discontinuities — piece
// silhouettes, seams between piece parts, curvature creases) rather
// than color edges, so flat-shaded surfaces like the checkerboard
// don't get inked, only the pieces' actual 3D contours do.
const normalMaterial = new THREE.MeshNormalMaterial();
let normalTarget = new THREE.WebGLRenderTarget(1, 1);

const inkShader = {
  uniforms: {
    tDiffuse: { value: null },
    tNormal: { value: null },
    resolution: { value: new THREE.Vector2(1, 1) },
  },
  vertexShader: `
    varying vec2 vUv;
    void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }
  `,
  fragmentShader: `
    uniform sampler2D tDiffuse;
    uniform sampler2D tNormal;
    uniform vec2 resolution;
    varying vec2 vUv;
    void main() {
      vec2 t = 1.0 / resolution;
      vec3 c  = texture2D(tNormal, vUv).rgb;
      vec3 nx1 = texture2D(tNormal, vUv + vec2( t.x, 0.0)).rgb;
      vec3 nx2 = texture2D(tNormal, vUv - vec2( t.x, 0.0)).rgb;
      vec3 ny1 = texture2D(tNormal, vUv + vec2( 0.0, t.y)).rgb;
      vec3 ny2 = texture2D(tNormal, vUv - vec2( 0.0, t.y)).rgb;
      float edge = length(nx1 - c) + length(nx2 - c) + length(ny1 - c) + length(ny2 - c);
      float ink = smoothstep(0.22, 0.55, edge);
      vec4 base = texture2D(tDiffuse, vUv);
      gl_FragColor = vec4(mix(base.rgb, vec3(0.03), ink), base.a);
    }
  `,
};

const inkPass = new ShaderPass(inkShader);

// cel-shaded (toon) piece materials: a stepped gradient ramp instead of
// smooth PBR lighting, for a distinct "cool" stylized look
function gradientRamp(steps) {
  const data = new Uint8Array(steps);
  for (let i = 0; i < steps; i++) data[i] = Math.round((255 * (i + 1)) / steps);
  const tex = new THREE.DataTexture(data, steps, 1, THREE.RedFormat);
  tex.needsUpdate = true;
  tex.magFilter = THREE.NearestFilter;
  tex.minFilter = THREE.NearestFilter;
  return tex;
}
const toonRamp = gradientRamp(4);
const mW = new THREE.MeshToonMaterial({ color: 0xece6d0, gradientMap: toonRamp });
const mB = new THREE.MeshToonMaterial({ color: 0x0d0d0d, gradientMap: toonRamp });

// rim outline for the cel-shaded look: an inverted, slightly enlarged
// backface-only shell behind every piece mesh. Dark outline on white
// pieces, light outline on black pieces so it reads against either.
const mOutlineDark  = new THREE.MeshBasicMaterial({ color: 0x08080a, side: THREE.BackSide });
const mOutlineLight = new THREE.MeshBasicMaterial({ color: 0xf5efe0, side: THREE.BackSide });

// black pieces are near-zero albedo, so multiplicative toon shading has
// nothing to work with and reads flat. Compensate with an additive,
// view-dependent white fresnel glow that traces the same curvature/edges
// the toon bands would otherwise show, without touching the base color.
const mFresnelRim = new THREE.ShaderMaterial({
  uniforms: {
    rimColor: { value: new THREE.Color(0xffffff) },
    power: { value: 2.4 },
    intensity: { value: 0.85 },
  },
  vertexShader: `
    varying vec3 vNormal;
    varying vec3 vViewDir;
    void main() {
      vNormal = normalize(normalMatrix * normal);
      vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
      vViewDir = normalize(-mvPosition.xyz);
      gl_Position = projectionMatrix * mvPosition;
    }
  `,
  fragmentShader: `
    varying vec3 vNormal;
    varying vec3 vViewDir;
    uniform vec3 rimColor;
    uniform float power;
    uniform float intensity;
    void main() {
      float fresnel = pow(1.0 - max(dot(normalize(vNormal), normalize(vViewDir)), 0.0), power);
      gl_FragColor = vec4(rimColor, fresnel * intensity);
    }
  `,
  transparent: true,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
  side: THREE.FrontSide,
});

function withOutline(mesh, group, pieceColor) {
  mesh.castShadow = true;
  const outlineMat = pieceColor === 'b' ? mOutlineLight : mOutlineDark;
  const outline = new THREE.Mesh(mesh.geometry, outlineMat);
  outline.position.copy(mesh.position);
  outline.rotation.copy(mesh.rotation);
  outline.scale.copy(mesh.scale).multiplyScalar(1.07);
  group.add(outline);
  group.add(mesh);
  if (pieceColor === 'b') {
    const rim = new THREE.Mesh(mesh.geometry, mFresnelRim);
    rim.position.copy(mesh.position);
    rim.rotation.copy(mesh.rotation);
    rim.scale.copy(mesh.scale);
    group.add(rim);
  }
  return mesh;
}

// extra geometry for knight head, rook battlements, king cross, etc.
const knightHeadG    = new THREE.BoxGeometry(0.28, 0.50, 0.36);

// ── Create Piece Mesh ─────────────────────────────────────────
function makePiece(type, color) {
  const mat = color === 'w' ? mW : mB;
  const g = new THREE.Group();

  const add = (m) => withOutline(m, g, color);

  if (type === 'n') {
    add(new THREE.Mesh(GEOS.n, mat));
    const head = new THREE.Mesh(knightHeadG, mat);
    head.position.set(0, 0.72, 0.06);
    head.rotation.x = -0.34;
    add(head);
    const muzzle = new THREE.Mesh(knightMuzzleG, mat);
    muzzle.position.set(0, 0.62, 0.24);
    muzzle.rotation.x = -0.12;
    add(muzzle);
    for (const side of [-1, 1]) {
      const ear = new THREE.Mesh(knightEarG, mat);
      ear.position.set(side * 0.08, 0.98, -0.03);
      ear.rotation.z = side * 0.35;
      add(ear);
    }
    if (color === 'b') g.rotation.y = Math.PI;

  } else if (type === 'k') {
    add(new THREE.Mesh(GEOS.k, mat));
    const ch = new THREE.Mesh(crossHG, mat); ch.position.set(0, 0.97, 0); add(ch);
    const cv = new THREE.Mesh(crossVG, mat); cv.position.set(0, 1.07, 0); add(cv);

  } else if (type === 'q') {
    add(new THREE.Mesh(GEOS.q, mat));
    // coronet of spikes ringing the crown — the queen's distinctive "tell"
    const N = 6;
    for (let i = 0; i < N; i++) {
      const a = (i / N) * Math.PI * 2;
      const spike = new THREE.Mesh(coronetSpikeG, mat);
      spike.position.set(Math.cos(a) * 0.15, 1.06, Math.sin(a) * 0.15);
      add(spike);
    }

  } else if (type === 'b') {
    add(new THREE.Mesh(GEOS.b, mat));
    const ball = new THREE.Mesh(mitreBallG, mat); ball.position.set(0, 1.02, 0); add(ball);
    // classic bishop's mitre notch — a deep diagonal cut, the bishop's "tell"
    const slit = new THREE.Mesh(mitreSlitG, mat);
    slit.position.set(0, 1.02, 0.09);
    slit.rotation.z = 0.55;
    add(slit);

  } else if (type === 'r') {
    add(new THREE.Mesh(GEOS.r, mat));
    for (let i = -1; i <= 1; i++) {
      const batt = new THREE.Mesh(battG, mat);
      batt.position.set(i * 0.16, 0.90, 0);
      add(batt);
    }
  } else if (type === 'p') {
    add(new THREE.Mesh(GEOS.p, mat));
    const cap = new THREE.Mesh(pawnCapG, mat); cap.position.set(0, 0.68, 0); add(cap);
  } else {
    add(new THREE.Mesh(GEOS[type], mat));
  }

  return g;
}

// ── Board State ───────────────────────────────────────────────
const BOARD_Y = 0.07; // top of squares
let pieces = [];
const activeTweens = [];

function clearPieces() {
  pieces.forEach(p => board.remove(p));
  pieces = [];
}

function squareToWorld(sq) {
  const file = sq.charCodeAt(0) - 97; // a=0, b=1...
  const rank = parseInt(sq[1]) - 1;   // 1=0, 8=7
  return { x: file, z: rank };
}

// purely visual tween: slides `obj` from fromSq to toSq over ~280ms with a
// small parabolic hop. Never affects game state — snapped to final position
// on completion, or instantly superseded the next time renderPos rebuilds.
function startTween(obj, fromSq, toSq, hopHeight) {
  const from = squareToWorld(fromSq);
  const to = squareToWorld(toSq);
  obj.position.set(from.x, BOARD_Y, from.z);
  activeTweens.push({
    obj, fromX: from.x, fromZ: from.z, toX: to.x, toZ: to.z,
    baseY: BOARD_Y, hopHeight, start: performance.now(), dur: 280,
  });
}

function updateTweens(now) {
  for (let i = activeTweens.length - 1; i >= 0; i--) {
    const tw = activeTweens[i];
    const t = Math.min(1, (now - tw.start) / tw.dur);
    const e = 1 - Math.pow(1 - t, 3); // ease-out cubic
    tw.obj.position.x = tw.fromX + (tw.toX - tw.fromX) * e;
    tw.obj.position.z = tw.fromZ + (tw.toZ - tw.fromZ) * e;
    tw.obj.position.y = tw.baseY + Math.sin(Math.min(t, 1) * Math.PI) * tw.hopHeight;
    if (t >= 1) {
      tw.obj.position.set(tw.toX, tw.baseY, tw.toZ);
      activeTweens.splice(i, 1);
    }
  }
}

function renderPos(chessBoard, lastMove) {
  clearPieces();
  hl1.visible = hl2.visible = false;
  activeTweens.length = 0;

  // castling: also animate the rook, if this move is a castle
  let rookFrom = null, rookTo = null;
  if (lastMove && lastMove.flags && lastMove.flags.includes('k')) {
    rookFrom = lastMove.color === 'w' ? 'h1' : 'h8';
    rookTo   = lastMove.color === 'w' ? 'f1' : 'f8';
  } else if (lastMove && lastMove.flags && lastMove.flags.includes('q')) {
    rookFrom = lastMove.color === 'w' ? 'a1' : 'a8';
    rookTo   = lastMove.color === 'w' ? 'd1' : 'd8';
  }

  if (lastMove) {
    // from/to are in chess notation: "e2" → col 4 file, rank 2
    const f = squareToWorld(lastMove.from);
    const t = squareToWorld(lastMove.to);
    hl1.position.set(f.x, BOARD_Y, f.z); hl1.visible = true;
    hl2.position.set(t.x, BOARD_Y, t.z); hl2.visible = true;
  }

  let destGroup = null, rookGroup = null;
  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {
      const sq = chessBoard[r][c];
      if (!sq) continue;
      const p = makePiece(sq.type, sq.color);
      const worldZ = 7 - r;
      p.position.set(c, BOARD_Y, worldZ);
      board.add(p);
      pieces.push(p);
      const sqName = String.fromCharCode(97 + c) + (8 - r);
      if (lastMove && sqName === lastMove.to) destGroup = p;
      if (rookTo && sqName === rookTo) rookGroup = p;
    }
  }

  if (lastMove && destGroup) {
    const hopH = lastMove.piece === 'n' ? 0.6 : 0.35;
    startTween(destGroup, lastMove.from, lastMove.to, hopH);
  }
  if (rookFrom && rookGroup) {
    startTween(rookGroup, rookFrom, rookTo, 0.35);
  }
}

// ── Decision tree (built from the retrieved sources' shared PGN prefixes) ──
function escXml(s) {
  return String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
function truncate(s, n) {
  return s.length > n ? s.slice(0, n - 1) + '…' : s;
}

function buildTreeData(sources) {
  const root = { san: null, depth: 0, children: new Map(), through: [], leaves: [] };
  for (const s of sources) {
    let hist;
    try {
      const tmp = new Chess();
      tmp.load_pgn(s.pgn);
      hist = tmp.history({ verbose: true });
    } catch (err) { continue; }
    if (!hist.length) continue;
    let node = root;
    for (let i = 0; i < hist.length; i++) {
      const san = hist[i].san;
      if (!node.children.has(san)) {
        node.children.set(san, { san, depth: i + 1, children: new Map(), through: [], leaves: [] });
      }
      node = node.children.get(san);
      node.through.push(hist);
    }
    node.leaves.push({ eco: s.eco, name: s.name });
  }
  return root;
}

let nodeById = new Map();
function assignIds(root) {
  nodeById = new Map();
  let seq = 0;
  (function walk(node) {
    for (const child of node.children.values()) {
      seq += 1;
      child.id = seq;
      nodeById.set(seq, child);
      walk(child);
    }
  })(root);
}

function layoutTree(root) {
  let leafY = 0;
  const positions = new Map();
  function visit(node) {
    if (node.children.size === 0) {
      const y = leafY * 34 + 17;
      leafY += 1;
      positions.set(node, { x: node.depth * 72, y });
      return y;
    }
    const ys = [];
    for (const child of node.children.values()) ys.push(visit(child));
    const y = ys.reduce((a, b) => a + b, 0) / ys.length;
    positions.set(node, { x: node.depth * 72, y });
    return y;
  }
  visit(root);
  return positions;
}

function renderDecisionTree(root, positions) {
  const wrap = document.getElementById('treewrap');
  const scrollEl = wrap.querySelector('.tree-scroll');
  let maxX = 0, maxY = 0;
  for (const [, p] of positions) { maxX = Math.max(maxX, p.x); maxY = Math.max(maxY, p.y); }
  maxX += 160; maxY += 24;

  let edgesSvg = '';
  let nodesSvg = '';

  function walk(node) {
    const p0 = positions.get(node);
    for (const child of node.children.values()) {
      const p1 = positions.get(child);
      const midX = (p0.x + p1.x) / 2;
      edgesSvg += `<path class="tedge" data-id="${child.id}" d="M ${p0.x} ${p0.y} C ${midX} ${p0.y}, ${midX} ${p1.y}, ${p1.x} ${p1.y}" fill="none" stroke="#252530" stroke-width="1.5"/>`;

      const isWhite = child.depth % 2 === 1;
      const fill = isWhite ? '#18181f' : 'rgba(240,234,214,.92)';
      const textColor = isWhite ? '#f0ead6' : '#18181f';
      const label = escXml(child.san);
      const w = Math.max(34, child.san.length * 7.5 + 16);

      nodesSvg += `<g class="tnode" data-id="${child.id}" tabindex="0" role="button" aria-label="${label}">` +
        `<rect class="thit" x="${p1.x - Math.max(20, w / 2)}" y="${p1.y - 14}" width="${Math.max(40, w)}" height="28" fill="transparent"/>` +
        `<rect class="tchip" x="${p1.x - w / 2}" y="${p1.y - 11}" width="${w}" height="22" rx="8" fill="${fill}" stroke="#252530"/>` +
        `<text x="${p1.x}" y="${p1.y + 4}" text-anchor="middle" fill="${textColor}">${label}</text>` +
        `</g>`;

      if (child.leaves.length) {
        const label2 = truncate(child.leaves.map(l => l.name).join(' / '), 22);
        nodesSvg += `<text class="tleaf" x="${p1.x + w / 2 + 8}" y="${p1.y + 4}">${escXml(label2)}</text>`;
      }

      walk(child);
    }
  }
  walk(root);

  scrollEl.innerHTML = `<svg width="${maxX}" height="${maxY}" viewBox="0 0 ${maxX} ${maxY}">${edgesSvg}${nodesSvg}</svg>`;
  wrap.style.display = 'block';

  scrollEl.onclick = (e) => {
    const g = e.target.closest('.tnode');
    if (!g) return;
    jumpToTreeNode(Number(g.dataset.id));
  };
  scrollEl.onkeydown = (e) => {
    if (e.key !== 'Enter' && e.key !== ' ') return;
    const g = e.target.closest?.('.tnode');
    if (!g) return;
    e.preventDefault();
    jumpToTreeNode(Number(g.dataset.id));
  };

  updateTreeHighlight();
}

let treeRoot = null;
function showDecisionTree(sources) {
  const wrap = document.getElementById('treewrap');
  if (!sources || !sources.length) { wrap.style.display = 'none'; treeRoot = null; return; }
  treeRoot = buildTreeData(sources);
  if (!treeRoot.children.size) { wrap.style.display = 'none'; treeRoot = null; return; }
  assignIds(treeRoot);
  const positions = layoutTree(treeRoot);
  renderDecisionTree(treeRoot, positions);
}
window.buildDecisionTree = showDecisionTree;

function jumpToTreeNode(id) {
  const node = nodeById.get(id);
  if (!node || !node.through.length) return;
  stopAutoplay();
  let longest = node.through[0];
  for (const h of node.through) if (h.length > longest.length) longest = h;
  moves = longest;
  jumpToPly(node.depth);
}

function updateTreeHighlight() {
  const wrap = document.getElementById('treewrap');
  if (!wrap) return;
  const scrollEl = wrap.querySelector('.tree-scroll');
  if (!scrollEl) return;
  scrollEl.querySelectorAll('.active').forEach(el => el.classList.remove('active'));
  if (!treeRoot) return;
  let node = treeRoot;
  for (let i = 0; i < idx; i++) {
    const san = moves[i]?.san;
    if (!san || !node.children.has(san)) break;
    node = node.children.get(san);
    const g = scrollEl.querySelector(`.tnode[data-id="${node.id}"]`);
    if (g) g.classList.add('active');
    const e = scrollEl.querySelector(`.tedge[data-id="${node.id}"]`);
    if (e) e.classList.add('active');
  }
}

// ── Move pill strip ────────────────────────────────────────────
const moveStripEl = document.getElementById('movestrip');
moveStripEl.addEventListener('click', (e) => {
  const btn = e.target.closest('.movepill:not(.num)');
  if (!btn) return;
  stopAutoplay();
  jumpToPly(Number(btn.dataset.ply));
});

function renderMoveStrip() {
  if (!moves.length) { moveStripEl.innerHTML = ''; moveStripEl.style.display = 'none'; return; }
  moveStripEl.style.display = 'flex';
  let html = '';
  for (let i = 0; i < moves.length; i++) {
    if (i % 2 === 0) html += `<span class="movepill num">${i / 2 + 1}.</span>`;
    const cur = (i + 1 === idx) ? ' current' : '';
    html += `<button type="button" class="movepill${cur}" data-ply="${i + 1}">${escXml(moves[i].san)}</button>`;
  }
  moveStripEl.innerHTML = html;
  const cur = moveStripEl.querySelector('.movepill.current');
  if (cur) cur.scrollIntoView({ inline: 'center', behavior: 'smooth', block: 'nearest' });
}

// ── Move Stepping ─────────────────────────────────────────────
let moves = [], idx = 0, chess = null;

function loadOpening(name, pgn) {
  stopAutoplay();
  document.getElementById('opname').textContent = name;
  const placard = document.getElementById('placard');
  if (placard) placard.classList.add('on');
  const tmp = new Chess();
  tmp.load_pgn(pgn);
  moves = tmp.history({ verbose: true });
  idx = 0;
  chess = new Chess();
  renderPos(chess.board(), null);
  syncUI();
}

function syncUI() {
  const el = document.getElementById('mvdisp');
  if (!moves.length) { el.textContent = '—'; }
  else if (idx === 0) { el.textContent = 'Starting position'; }
  else {
    const mv = moves[idx - 1];
    const num = Math.ceil(idx / 2);
    el.textContent = `${num}${idx % 2 === 1 ? '.' : '…'} ${mv.san}`;
  }
  ['b0','b1'].forEach(id => document.getElementById(id).disabled = idx === 0);
  ['b2','b3'].forEach(id => document.getElementById(id).disabled = !moves.length || idx >= moves.length);
  const bplay = document.getElementById('bplay');
  if (bplay) bplay.disabled = !moves.length;
  renderMoveStrip();
  updateTreeHighlight();
}

function jumpToPly(n) {
  if (!chess) return;
  idx = Math.max(0, Math.min(n, moves.length));
  chess = new Chess();
  for (let i = 0; i < idx; i++) chess.move(moves[i].san);
  renderPos(chess.board(), idx > 0 ? moves[idx - 1] : null);
  syncUI();
}
window.jumpToPly = jumpToPly;

// ── Autoplay ──────────────────────────────────────────────────
let autoplayTimer = null;
function stopAutoplay() {
  if (autoplayTimer) { clearInterval(autoplayTimer); autoplayTimer = null; }
  const btn = document.getElementById('bplay');
  if (btn) { btn.textContent = '▶︎'; btn.title = 'Autoplay'; }
}
function toggleAutoplay() {
  if (autoplayTimer) { stopAutoplay(); return; }
  if (!moves.length) return;
  if (idx >= moves.length) jumpToPly(0);
  const btn = document.getElementById('bplay');
  if (btn) { btn.textContent = '⏸'; btn.title = 'Pause'; }
  autoplayTimer = setInterval(() => {
    if (!chess || idx >= moves.length) { stopAutoplay(); return; }
    jumpToPly(idx + 1);
  }, 1200);
}
window.toggleAutoplay = toggleAutoplay;

window.goFwd   = () => { stopAutoplay(); if (chess && idx < moves.length) jumpToPly(idx + 1); };
window.goBack  = () => { stopAutoplay(); if (idx > 0) jumpToPly(idx - 1); };
window.goStart = () => { stopAutoplay(); jumpToPly(0); };
window.goEnd   = () => { stopAutoplay(); jumpToPly(moves.length); };

// expose for API script
window.loadOpening = loadOpening;

// ── Resize ────────────────────────────────────────────────────
function resize() {
  const w = canvas.clientWidth, h = canvas.clientHeight;
  if (canvas.width !== w || canvas.height !== h) {
    renderer.setSize(w, h, false);
    composer.setSize(w, h);
    const pr = renderer.getPixelRatio();
    const rw = Math.max(1, Math.round(w * pr)), rh = Math.max(1, Math.round(h * pr));
    normalTarget.setSize(rw, rh);
    inkPass.uniforms.resolution.value.set(rw, rh);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  }
}

// ── Init & Loop ───────────────────────────────────────────────
chess = new Chess();
renderPos(chess.board(), null);
syncUI();

;(function loop() {
  requestAnimationFrame(loop);
  resize();

  const now = performance.now();
  updateTweens(now);

  if (!flightActive) {
    if (!idleStopped) {
      const t = (now - idleStart) / 1000;
      const ang = idleBaseAngle + Math.sin((t / 8) * Math.PI * 2) * 0.04;
      camera.position.set(
        controls.target.x + Math.cos(ang) * idleRadius,
        controls.target.y + idleHeight,
        controls.target.z + Math.sin(ang) * idleRadius
      );
      camera.lookAt(controls.target);
    }
    controls.update();
  }

  scene.overrideMaterial = normalMaterial;
  renderer.setRenderTarget(normalTarget);
  renderer.render(scene, camera);
  renderer.setRenderTarget(null);
  scene.overrideMaterial = null;
  inkPass.uniforms.tNormal.value = normalTarget.texture;

  composer.render();
})();
</script>

<script>
// ── API ───────────────────────────────────────────────────────
const API = window.location.hostname === 'localhost'
  ? 'http://localhost:8001'
  : 'https://chessopenings-ptkm.onrender.com';

// health ping
fetch(`${API}/health`)
  .then(r => r.ok ? r.json() : Promise.reject())
  .then(() => {
    document.getElementById('dot').className = 'dot ok';
    document.getElementById('st').textContent = 'API connected';
  })
  .catch(() => {
    document.getElementById('dot').className = 'dot err';
    document.getElementById('st').textContent = 'API offline';
  });

window.fillQ = btn => {
  document.getElementById('q').value = btn.textContent;
  ask();
};

// ── Markdown → HTML (escapes first, then converts a small safe subset) ──
function escapeHtml(s) {
  return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
function mdToHtml(text) {
  let s = escapeHtml(text);
  s = s.replace(/^###\s+(.*)$/gm, '<h4>$1</h4>');
  s = s.replace(/^##\s+(.*)$/gm, '<h3>$1</h3>');
  s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/`([^`]+?)`/g, '<code>$1</code>');
  s = s.replace(/(^|[^*])\*([^*\n]+?)\*(?!\*)/g, '$1<em>$2</em>');

  // group consecutive "- " / "* " lines into <ul><li>
  const lines = s.split('\n');
  const grouped = [];
  let inList = false;
  for (const line of lines) {
    const m = line.match(/^\s*[-*]\s+(.*)$/);
    if (m) {
      if (!inList) { grouped.push('<ul>'); inList = true; }
      grouped.push(`<li>${m[1]}</li>`);
    } else {
      if (inList) { grouped.push('</ul>'); inList = false; }
      grouped.push(line);
    }
  }
  if (inList) grouped.push('</ul>');

  // assemble paragraphs from consecutive plain-text lines, leaving
  // already-block-level lines (headings/lists) untouched so a list
  // butted right up against a paragraph (no blank line) doesn't get
  // wrapped/merged with it.
  const isBlockLine = (l) => /^<(h3|h4|ul|\/ul|li)/.test(l);
  const out = [];
  let para = [];
  const flushPara = () => {
    const t = para.join('<br>').trim();
    if (t) out.push(`<p>${t}</p>`);
    para = [];
  };
  for (const line of grouped) {
    const trimmed = line.trim();
    if (trimmed === '') { flushPara(); continue; }
    if (isBlockLine(trimmed)) { flushPara(); out.push(trimmed); continue; }
    para.push(trimmed);
  }
  flushPara();
  return out.join('');
}

// ── Cold-start-aware "thinking" indicator ──────────────────────
let thinkTimer = null, thinkStartTs = 0;
function updateThinkingMsg() {
  const s = Math.floor((Date.now() - thinkStartTs) / 1000);
  const msgEl = document.getElementById('thinkMsg');
  const elEl  = document.getElementById('thinkElapsed');
  let msg;
  if (s < 4) msg = 'Analyzing…';
  else if (s < 10) msg = 'Searching opening database…';
  else if (s < 30) msg = 'Waking the server — free hosting naps when idle. Up to a minute on the first question…';
  else msg = 'Still waking up — hang tight…';
  if (msgEl) msgEl.textContent = msg;
  if (elEl)  elEl.textContent = s >= 10 ? ` · ${s}s` : '';
}
function startThinking() {
  thinkStartTs = Date.now();
  updateThinkingMsg();
  clearInterval(thinkTimer);
  thinkTimer = setInterval(updateThinkingMsg, 1000);
}
function stopThinking() {
  clearInterval(thinkTimer);
  thinkTimer = null;
}

function skeletonCardsHtml(n) {
  return Array.from({ length: n }).map((_, i) => `
    <div class="source-card skeleton-card" style="animation-delay:${i * 60}ms">
      <span class="eco skeleton-shimmer skel-eco"></span>
      <div style="flex:1;min-width:0">
        <div class="skeleton-shimmer skel-line1"></div>
        <div class="skeleton-shimmer skel-line2"></div>
      </div>
    </div>`).join('');
}

const ECO_RGB = { A: '192,132,252', B: '96,165,250', C: '74,222,128', D: '251,191,36', E: '248,113,113' };
function ecoStyle(eco) {
  const rgb = ECO_RGB[(eco || '')[0]] || '212,175,55';
  return `color:rgb(${rgb});border-color:rgba(${rgb},0.85);`;
}

function sourceCardHtml(s, i) {
  const pct = Math.max(0, Math.min(100, Math.round((s.similarity || 0) * 100)));
  const circumference = 56.549;
  const offset = circumference * (1 - pct / 100);
  const ecoSafe  = escapeHtml(s.eco);
  const nameSafe = escapeHtml(s.name);
  const pgnSafe  = escapeHtml(s.pgn);
  return `
    <div class="source-card" data-i="${i}" style="animation-delay:${i * 60}ms"
         onclick="pickSource(this,'${esc(s.name)}','${esc(s.pgn)}')">
      <span class="eco" style="${ecoStyle(s.eco)}">${ecoSafe}</span>
      <div style="flex:1;min-width:0">
        <div class="src-name">${nameSafe}</div>
        <div class="src-pgn">${pgnSafe}</div>
      </div>
      <div class="sim-ring" title="${pct}% match">
        <svg width="22" height="22" viewBox="0 0 22 22">
          <circle cx="11" cy="11" r="9" fill="none" stroke="var(--border)" stroke-width="2"/>
          <circle cx="11" cy="11" r="9" fill="none" stroke="var(--gold)" stroke-width="2"
                  stroke-linecap="round" stroke-dasharray="${circumference}"
                  stroke-dashoffset="${offset}" transform="rotate(-90 11 11)"/>
        </svg>
        <span class="sim-pct">${pct}</span>
      </div>
    </div>`;
}

window.ask = async () => {
  const q = document.getElementById('q').value.trim();
  if (!q) return;

  const send    = document.getElementById('send');
  const think   = document.getElementById('thinking');
  const ac      = document.getElementById('ac');
  const at      = document.getElementById('at');
  const ss      = document.getElementById('ss');
  const sl      = document.getElementById('sl');

  send.disabled = true;
  think.classList.add('on');
  startThinking();
  ac.classList.remove('on');
  ss.style.display = 'block';
  sl.innerHTML = skeletonCardsHtml(3);

  try {
    const res = await fetch(`${API}/ask`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: q })
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    at.className = 'answer-text';
    at.innerHTML = mdToHtml(data.answer);
    ac.classList.add('on');

    if (data.sources?.length) {
      sl.innerHTML = data.sources.map((s, i) => sourceCardHtml(s, i)).join('');
      ss.style.display = 'block';
      // auto-load top result
      pickSource(sl.querySelector('.source-card'), data.sources[0].name, data.sources[0].pgn);
      window.buildDecisionTree?.(data.sources);
    } else {
      ss.style.display = 'none';
      window.buildDecisionTree?.([]);
    }
  } catch (e) {
    at.className = 'answer-text err';
    at.textContent = `Error: ${e.message}`;
    ac.classList.add('on');
    ss.style.display = 'none';
    window.buildDecisionTree?.([]);
  } finally {
    think.classList.remove('on');
    stopThinking();
    send.disabled = false;
  }
};

window.pickSource = (el, name, pgn) => {
  document.querySelectorAll('.source-card').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  window.loadOpening?.(name, pgn);
};

function esc(s) {
  return (s || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'");
}

// Enter submits (Shift+Enter for a newline); Ctrl/Cmd+Enter also still works.
document.getElementById('q').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); window.ask(); }
});

// ←/→ step through the loaded line, Home/End jump to the ends — ignored
// while the user is typing in the textarea.
document.addEventListener('keydown', e => {
  const tag = document.activeElement?.tagName;
  if (tag === 'TEXTAREA' || tag === 'INPUT') return;
  if (e.key === 'ArrowLeft')       { e.preventDefault(); window.goBack?.(); }
  else if (e.key === 'ArrowRight') { e.preventDefault(); window.goFwd?.(); }
  else if (e.key === 'Home')       { e.preventDefault(); window.goStart?.(); }
  else if (e.key === 'End')        { e.preventDefault(); window.goEnd?.(); }
});
</script>

</body>
</html>
